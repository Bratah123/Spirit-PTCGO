# Spirit-PTCGO asset edge — caching reverse proxy in front of the Python asset server.
#
# WHY: the Python http.server delivers each ~84 MB set bundle in a single
# wfile.write() with no HTTP Range / resume support. Over WAN that truncates
# ("Bundle-Failed: Received no data in response"). nginx fixes this: it buffers
# the full upstream response to an immutable on-disk cache, serves it with
# sendfile + byte-range support, and answers client retries instantly from cache.
#
# TOPOLOGY: client -> nginx :8000 (public) -> Python asset server 127.0.0.1:8001
#   Run the Python server with SPIRIT_HTTP_PORT=8001 (keep TCP_PORT unchanged).
#   AssetURL is derived from the client's Host header, so it keeps pointing at
#   :8000 (nginx) automatically — no server code change needed.
#
# INSTALL (Debian/Ubuntu VPS):
#   sudo cp deploy/nginx-spirit.conf /etc/nginx/sites-available/spirit
#   sudo ln -s /etc/nginx/sites-available/spirit /etc/nginx/sites-enabled/
#   sudo mkdir -p /var/cache/spirit_assets && sudo chown www-data:www-data /var/cache/spirit_assets
#   sudo nginx -t && sudo systemctl reload nginx

proxy_cache_path /var/cache/spirit_assets
                 levels=1:2
                 keys_zone=spirit_assets:50m
                 max_size=8g
                 inactive=60d
                 use_temp_path=off;

upstream spirit_python {
    server 127.0.0.1:8001;
    keepalive 32;
}

server {
    listen 8000;
    listen [::]:8000;
    server_name _;

    # Set bundles are large; let the whole body buffer to disk for caching.
    client_max_body_size 4m;            # inbound POSTs (CAS login) are tiny
    proxy_max_temp_file_size 1024m;
    proxy_http_version 1.1;
    proxy_set_header Host $http_host;   # preserve host:port so AssetURL stays :8000
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header Connection "";
    proxy_read_timeout 300s;
    proxy_send_timeout 300s;

    # Immutable Unity bundles: cache hard, serve ranges + resume from disk.
    location ~ \.unity3d$ {
        proxy_pass http://spirit_python;
        proxy_cache spirit_assets;
        proxy_cache_valid 200 365d;
        proxy_cache_lock on;                     # one upstream fetch per key under a stampede
        proxy_cache_lock_timeout 300s;
        proxy_cache_use_stale error timeout updating;
        proxy_cache_revalidate on;
        proxy_ignore_headers Set-Cookie;
        add_header X-Cache-Status $upstream_cache_status;
        add_header Accept-Ranges bytes;
    }

    # Product/cosmetic PNGs are also effectively static — cache them too.
    location ~ \.(png|jpg|txt)$ {
        proxy_pass http://spirit_python;
        proxy_cache spirit_assets;
        proxy_cache_valid 200 7d;
        add_header X-Cache-Status $upstream_cache_status;
        add_header Accept-Ranges bytes;
    }

    # Everything dynamic (config.json, manifest.*, /cas, /admin, sso/login,
    # motd.json, telemetry) must NOT be cached — pass straight through.
    location / {
        proxy_pass http://spirit_python;
        proxy_cache off;
    }
}
